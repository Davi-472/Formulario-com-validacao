<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de endereço</title>
</head>
<body>
    <header>
        <h2>Cadastro de endereço</h2>
    </header>
    <form id="formulario">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" maxlength="9" required><br><br>
        
        <label for="logradouro">Logradouro:</label>
        <input type="text" id="logradouro" required><br><br>

        <label for="numero">Número:</label>
        <input type="text" id="numero" required><br><br>

        <label for="uf">UF:</label>
        <input type="text" id="uf" maxlength="2" required><br><br>

        <label for="complemento">Complemento:</label>
        <input type="text" id="complemento"><br><br>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
